<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NexusMart{% endblock %}</title>
    <!-- 🔹 核心：Tailwind CSS 載入點 (使用 // 避開強制連結轉換 Bug) -->
    <script src="//cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- 導覽列 -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600 uppercase tracking-wider">NexusMart</a>
            <div class="space-x-6 text-gray-600">
                <a href="/" class="hover:text-blue-500 transition-colors">首頁</a>
                <!-- 🔹 新增這行：查詢訂單入口 -->
                <a href="{% url 'order_search' %}" class="hover:text-blue-500 transition-colors font-semibold">🔍 查詢訂單</a>
                
                <!-- 原本的購物車與後台按鈕 -->
                <a href="{% url 'cart_detail' %}" class="hover:text-blue-500 transition-colors font-bold text-gray-800">🛒 購物車</a>
                <a href="/admin/" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-all">管理後台</a>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white py-10 mt-20">
        <div class="container mx-auto text-center text-gray-400">
            &copy; 2026 NexusMart 全端電商實作專案
        </div>
    </footer>
</body>
</html>
