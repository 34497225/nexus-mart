<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NexusMart | 日常質感{% endblock %}</title>
    <!-- 載入 Tailwind CSS -->
    <script src="//cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Noto Sans TC', sans-serif; }</style>
</head>
<body class="bg-[#faf9f6] text-[#4a4a4a] min-h-screen flex flex-col">
    <!-- 🌟 極簡導覽列 -->
    <nav class="border-b border-[#eaeaea] bg-white/90 backdrop-blur-md sticky top-0 z-50 py-4">
        <div class="max-w-6xl mx-auto px-6 flex flex-wrap items-center justify-between gap-4">
            
            <!-- Logo -->
            <a href="/" class="text-xl font-medium tracking-widest text-[#2c2c2c] hover:opacity-70 transition">
                NEXUSMART
            </a>

            <!-- 🔹 你的搜尋表單 (極簡風圓角設計) -->
            <form action="{% url 'search' %}" method="GET" class="flex-1 max-w-md hidden md:block mx-4">
                <div class="relative">
                    <input type="text" name="q" value="{{ request.GET.q|default:'' }}" placeholder="尋找日常質感好物..." required class="w-full bg-[#f4f4f4] border-none text-sm px-5 py-2.5 rounded-full focus:outline-none focus:ring-1 focus:ring-[#c2c0bb] transition-all">
                    <button type="submit" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-black transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </button>
                </div>
            </form>

            <!-- 🔹 你的右側選單 (保留所有 Django 路由) -->
            <div class="flex items-center space-x-6 text-sm font-medium">
                <a href="/" class="hover:text-black transition hidden sm:block">首頁</a>
                <a href="{% url 'order_search' %}" class="hover:text-black transition">查詢訂單</a>
                <a href="{% url 'cart_detail' %}" class="hover:text-black transition flex items-center gap-1">
                    購物車
                    <span class="text-[10px] bg-[#2c2c2c] text-white px-2 py-0.5 rounded-full">🛒</span>
                </a>
                <a href="/admin/" class="border border-[#2c2c2c] text-[#2c2c2c] px-4 py-1.5 rounded-full hover:bg-[#2c2c2c] hover:text-white transition-all">
                    管理後台
                </a>
            </div>
        </div>
        
        <!-- 手機版搜尋框 (螢幕變小時顯示在下方) -->
        <div class="md:hidden px-6 pt-4">
            <form action="{% url 'search' %}" method="GET">
                <div class="relative w-full">
                    <input type="text" name="q" value="{{ request.GET.q|default:'' }}" placeholder="搜尋..." required class="w-full bg-[#f4f4f4] border-none text-sm px-4 py-2 rounded-full focus:outline-none">
                </div>
            </form>
        </div>
    </nav>

    <!-- 🌟 主要內容區 (Django 注入點) -->
    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- 🌟 留白優雅的頁尾 -->
    <footer class="border-t border-[#eaeaea] bg-white py-12 mt-16">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <h2 class="text-xl font-medium tracking-widest text-[#2c2c2c] mb-4">NEXUSMART</h2>
            <p class="text-sm text-[#888] mb-6">回歸生活的本質，嚴選每一個日常物件。</p>
            <div class="text-xs text-[#b0b0b0] tracking-wider uppercase">
                &copy; 2026 NexusMart Ops Project. All rights reserved.
            </div>
        </div>
    </footer>
</body>
</html>
