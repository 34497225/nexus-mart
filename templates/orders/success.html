{% extends "base.html" %}
{% block title %}下單成功 | NexusMart.{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-32 text-center">
    <h1 class="font-serif text-5xl font-bold text-gray-900 mb-6 italic">Thank You.</h1>
    <p class="text-gray-500 mb-12">感謝您的購買。您的訂單已成立，我們將盡快為您處理。</p>
    
    <div class="inline-block text-left bg-gray-50 p-8 rounded-2xl mb-12 min-w-[300px]">
        <div class="mb-6 pb-6 border-b border-gray-200">
            <span class="block text-xs text-gray-400 uppercase tracking-widest mb-1">Order Number</span>
            <span class="font-serif text-2xl text-gray-900">#{{ order.id }}</span>
        </div>
        <div class="flex justify-between items-end">
            <div>
                <span class="block text-xs text-gray-400 uppercase tracking-widest mb-1">Customer</span>
                <span class="text-gray-900">{{ order.name }}</span>
            </div>
            <div class="text-right">
                <span class="block text-xs text-gray-400 uppercase tracking-widest mb-1">Total</span>
                <span class="font-medium text-gray-900">${{ order.total_amount }}</span>
            </div>
        </div>
    </div>
    
    <br>
    <a href="/" class="text-sm font-medium text-gray-900 border-b border-gray-900 pb-0.5 hover:text-gray-500 hover:border-gray-500 transition-colors">
        返回首頁
    </a>
</div>
{% endblock %}
