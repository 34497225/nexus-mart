{% extends "base.html" %}
{% block title %}結帳 | NexusMart.{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="text-center mb-12">
        <h1 class="font-serif text-3xl md:text-4xl font-bold text-gray-900 mb-4">Checkout.</h1>
        <p class="text-sm text-gray-400 tracking-widest uppercase">Shipping Information</p>
    </div>
    
    {% if error %}
    <div class="bg-red-50 text-red-600 px-6 py-4 rounded-xl mb-8 text-sm font-medium text-center">
        {{ error }}
    </div>
    {% endif %}

    <form action="{% url 'checkout' %}" method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-semibold text-gray-900 uppercase tracking-widest mb-2">姓名 Name</label>
            <input type="text" name="name" required class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-1 focus:ring-gray-900 focus:bg-white transition-all outline-none">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-900 uppercase tracking-widest mb-2">電話 Phone</label>
            <input type="text" name="phone" required class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-1 focus:ring-gray-900 focus:bg-white transition-all outline-none">
        </div>
        <div class="pb-6">
            <label class="block text-xs font-semibold text-gray-900 uppercase tracking-widest mb-2">地址 Address</label>
            <textarea name="address" required rows="3" class="w-full px-5 py-4 bg-gray-50 border-none rounded-xl focus:ring-1 focus:ring-gray-900 focus:bg-white transition-all outline-none resize-none"></textarea>
        </div>
        
        <button type="submit" class="w-full bg-gray-900 text-white font-medium py-5 rounded-full hover:bg-gray-800 transition-colors tracking-wide text-lg">
            確認下單 Place Order
        </button>
    </form>
</div>
{% endblock %}
