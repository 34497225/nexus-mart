services:
  # 1. 資料庫
  db:
    image: mysql:8.0
    container_name: nexus_db
    restart: always
    environment:
      MYSQL_DATABASE: nexus_mart
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Redis 緩存與訊息佇列
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. 網頁伺服器
  web:
    build: .
    container_name: nexus_web
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: python manage.py runserver 0.0.0.0:8000

  # 4. Celery 背景任務處理器
  celery:
    build: .
    container_name: nexus_celery
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    # 啟動 celery worker 的專屬指令
    command: celery -A config worker -l INFO

volumes:
  mysql_data: